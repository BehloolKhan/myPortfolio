<!-- asks the user to post a blog entry via a form (Can be included as a temporary
link in index.html). -->

<!-- To access it, user must login -> addEntry -> then this form is filled out -> blog displayed -->
<!-- Alternatively, login -> addEntry and then have the option to view blog page directly -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>add entry</title>

    <!-- style sheets -->
    <link href="/css/reset.css" rel="stylesheet">
    <link href="/css/addEntry.css" rel="stylesheet">

    <!-- Link to google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Pangolin&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">



</head>
<body>

    <a href="/html/blog.html">blog</a>

    <article>

        <h1>addEntry</h1>

        <section id="Form">
            <form method="GET">
                <fieldset>

                    <div id="message">
                        <h2>Welcome back</h2>
                    </div>

                    <figure>
                            <img src="../images/particles.png" id="logo">
                    </figure>


                    <div>
                        <label for="user-title">Title: </label>
                        <br>
                        <input type="text" name="userTitle" class="userInput" id="user-title">
                    </div>

                    <!-- Think about the structure of password -->
                    <div>
                        <label for="user-description">Description: </label>
                        <br>
                        <textarea name="userDescription" class="userInput" id="user-description"></textarea>
                    </div>

                    <div id="Buttons">
                        <input type="submit" class="Button" value="Post">
                        <input type="reset" class="Button" value="Clear">
                    </div>

                </fieldset>
            </form>
        </section>

        <section id="image">
            <figure>
                <img src="/images/betterGPU.png" alt="Image of GPU">
                <figcaption>I love GPUs</figcaption>
            </figure>
        </section>

        
    </article>
</body>
</html>
